<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{email.activation.title}">Kích hoạt tài khoản</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        color: white;
        padding: 24px;
        border-radius: 8px 8px 0 0;
      }
      .header h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 600;
      }
      .content {
        background: #f8fafc;
        padding: 24px;
        border: 1px solid #e2e8f0;
        border-top: none;
        border-radius: 0 0 8px 8px;
      }
      .message {
        margin: 16px 0;
      }
      .btn {
        display: inline-block;
        background: #2563eb;
        color: white !important;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 500;
        margin-top: 16px;
      }
      .btn:hover {
        background: #1d4ed8;
      }
      .footer {
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #e2e8f0;
        font-size: 0.875rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1 th:text="#{email.activation.title}">Kích hoạt tài khoản</h1>
    </div>
    <div class="content">
      <p th:text="#{email.activation.greeting(${user.login})}">Xin chào,</p>
      <div class="message">
        <p th:text="#{email.activation.text1}">Tài khoản của bạn đã được tạo. Vui lòng nhấn nút bên dưới để kích hoạt:</p>
      </div>
      <p>
        <a th:with="url=(@{|${baseUrl}/activate?key=${user.activationKey}|})" th:href="${url}" class="btn">Kích hoạt tài khoản</a>
      </p>
      <div class="footer">
        <span th:text="#{email.activation.text2}">Trân trọng,</span><br />
        <em th:text="#{email.signature}">Hệ thống Quản lý cuộc họp</em>
      </div>
    </div>
  </body>
</html>
