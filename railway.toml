# Railway config: tăng timeout + heap để app kịp start (Liquibase + Hibernate lâu)
# Required Variables (Railway dashboard): SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
#   SPRING_DATASOURCE_PASSWORD, JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET (e.g. openssl rand -base64 64)
# AI (gợi ý biên bản + trợ lý /api/ai/chat): OPENAI_API_KEY; tùy chọn OPENAI_MODEL, OPENAI_BASE_URL, OPENAI_TIMEOUT_MS
#
# Khi dùng Dockerfile (meetings/Dockerfile): jar trong image là app.jar → startCommand dùng app.jar
# Khi dùng Nixpacks (không Dockerfile) + Root Directory = "meetings": jar tại target/meetings-0.0.1-SNAPSHOT.jar

[build]
# Nixpacks: build trong thư mục meetings khi repo root là meetingApp
buildCommand = "cd meetings && mvn -B -DskipTests -Pproduction clean package"

[deploy]
# Không truyền -Dserver.port=$PORT (Railway có thể không expand $PORT → Spring nhận chuỗi "$PORT").
# application-prod.yml đã có server.port: ${PORT:8080} → Spring đọc biến môi trường PORT (Railway set sẵn).
startCommand = "java -Xms256m -Xmx1024m -jar app.jar"
healthcheckPath = "/management/health"
healthcheckTimeout = 180
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
