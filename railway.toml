# Railway config: tăng timeout + heap để app kịp start (Liquibase + Hibernate lâu)
[deploy]
startCommand = "java -Xms256m -Xmx1024m -Dserver.port=$PORT -jar target/meetings-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/management/health"
healthcheckTimeout = 180
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
